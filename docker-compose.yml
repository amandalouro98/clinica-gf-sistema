version: '3.8'

services:
  app:
    build: .
    container_name: clinica-gf-app
    ports:
      - "8501:8501"
    environment:
      - DB_URL=${DB_URL:-postgresql://postgres:ClinicaGF2024!@db:5432/clinica}
      - GOOGLE_CREDENTIALS_PATH=/app/secrets/google-credentials.json
      - GOOGLE_FORM_LINK=${GOOGLE_FORM_LINK:-https://forms.gle/mBuxyP37Ysk5KtMHA}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./secrets:/app/secrets:ro
      - ./.env:/app/.env:ro
    depends_on:
      - db
    restart: always
    networks:
      - clinica-network

  db:
    image: postgres:15-alpine
    container_name: clinica-gf-db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ClinicaGF2024!}
      - POSTGRES_DB=clinica
      - POSTGRES_USER=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: always
    networks:
      - clinica-network

  nginx:
    image: nginx:alpine
    container_name: clinica-gf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./ui:/var/www/static/ui:ro
    depends_on:
      - app
    restart: always
    networks:
      - clinica-network

  certbot:
    image: certbot/certbot
    container_name: clinica-gf-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - clinica-network

volumes:
  postgres_data:
    driver: local

networks:
  clinica-network:
    driver: bridge
