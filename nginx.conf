events {
    worker_connections 1024;
}

http {
    upstream streamlit {
        server app:8501;
    }

    # Redirecionar HTTP para HTTPS
    server {
        listen 80;
        server_name gabrifrancosaude.com.br www.gabrifrancosaude.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Servidor HTTPS
    server {
        listen 443 ssl http2;
        server_name gabrifrancosaude.com.br www.gabrifrancosaude.com.br;

        ssl_certificate /etc/letsencrypt/live/gabrifrancosaude.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gabrifrancosaude.com.br/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Configuracoes de proxy para Streamlit
        location / {
            proxy_pass http://streamlit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
